server:
  port: 9000

spring:
  application:
    name: deeplearnx
#  profiles:
#    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public

springdoc:
  swagger-ui:
    path: /

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

superadmin:
  username: ${SUPERADMIN_USERNAME}
  email: ${SUPERADMIN_EMAIL}
  password: ${SUPERADMIN_PASSWORD}
  fullName: ${SUPERADMIN_FULLNAME}

export:
  template:
    dir: ./templates
    course: ./templates/course_export_template.xlsx
    user: ./templates/user_export_template.xlsx
    user-import: ./templates/user_import_template.xlsx
    course-import: ./templates/course_import_template.xlsx
    lesson-import: ./templates/lesson_import_template.xlsx
  start-row: 4
